<!DOCTYPE html>
<html>
<head>
    <title>Object Detection Website</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Object Detection Website</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br><br>
        <button type="submit">Detect Objects</button>
    </form>

    {% if detected_image %}
        <h2>Detection Result</h2>
        <img src="{{ detected_image }}">
    {% endif %}
</div>

</body>
</html>
